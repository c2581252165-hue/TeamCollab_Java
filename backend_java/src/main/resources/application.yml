spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3306/teamcollab?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8000

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

ark:
  api:
    key: ${DEEPSEEK_API_KEY:}

